name: Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: python -m pip install mkdocs

      - name: Validate Reqtrace ledger
        run: python scripts/validate_reqtrace.py

      - name: Build documentation
        run: mkdocs build --strict
