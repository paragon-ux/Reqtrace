name: Reqtrace

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Reqtrace ledger
        run: python scripts/reqtrace.py check --strict

      - name: Install test runner
        run: python -m pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run calibration
        run: python examples/calibration/run.py
